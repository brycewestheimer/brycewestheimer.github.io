# Site Configuration
title: "Bryce Westheimer"
description: "Theoretical chemistry and applied mathematics researcher advancing computational modeling, optimization, and numerical analysis for fragment-based quantum chemistry"
url: "https://brycewestheimer.github.io"
baseurl: ""

# Author Information
author:
  name: "Bryce Westheimer"
  title: "Postdoctoral Research Associate, University of Colorado, Denver"
  bio: "Theoretical chemist and applied mathematician focused on computational modeling, optimization, and numerical analysis for fragment-based quantum chemistry and accelerator-ready scientific software."
  location: "Vancouver, WA"
  email: "brycemwestheimer@gmail.com"
  github: "brycewestheimer"
  linkedin: "bryce-westheimer"
  google_scholar: "gnELDysAAAAJ"
  avatar: "/assets/profile_image.jpg"

# Site Settings
layout: sidebar
style: auto  # Matches system theme preference
timezone: America/Los_Angeles

plugins:
  - jekyll-octicons
  - jekyll-github-metadata
  - jemoji
  - jekyll-sitemap
  - jekyll-feed

permalink: /:year/:month/:day/:title/

# Collections
collections:
  tutorials:
    output: true
    permalink: /tutorials/:name/

# SEO Settings
lang: en_US
twitter:
  card: summary_large_image

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Bryce Westheimer"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"
  - scope:
      path: ""
      type: "tutorials"
    values:
      layout: "post"
      author: "Bryce Westheimer"
      category: "tutorial"

# Project Settings
projects:
  sort_by: pushed
  limit: 9
  exclude:
    archived: false
    forks: true
    projects:
      # Add any repos you want to exclude

# Navigation
navigation:
  - name: "Home"
    url: "/"
  - name: "About"
    url: "/about/"
  - name: "Projects"
    subnav:
      - name: "Computational Chemistry"
        url: "/topics/computational-chemistry/"
        category: "computational-chemistry"
      - name: "ML & AI"
        url: "/topics/ml-ai/"
        category: "ml-ai"
      - name: "General Software"
        url: "/topics/general/"
        category: "general"
  - name: "Research"
    url: "/research/"
  - name: "Publications"
    url: "/publications/"
  - name: "Blog"
    url: "/blog/"
  - name: "Tutorials"
    url: "/tutorials/"
  - name: "Contact"
    url: "/contact/"

# Social Media Configuration
social_media:
  github: brycewestheimer
  linkedin: bryce-westheimer
  google_scholar: gnELDysAAAAJ
  email: brycemwestheimer@gmail.com

