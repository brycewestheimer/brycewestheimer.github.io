# Topic Pages Data Structure
topics:
  computational-chemistry:
    name: "Computational Chemistry"
    description: "Fragment-based quantum chemistry, MAP methods, and electronic structure software development"
    icon: "beaker"
    url: "/topics/computational-chemistry/"
    projects:
      - "libfrag"
      - "public_libaccsapt"
      - "public_qccg"
    skills: ["GAMESS", "Psi4", "PySCF", "Fortran", "C++", "libfrag", "MAP", "Subsystem-local SAPT"]
    
  ml-ai:
    name: "ML & AI"
    description: "Machine learning applications for computational chemistry, method acceleration, and molecular discovery"
    icon: "cpu"
    url: "/topics/ml-ai/"
    projects:
      - "public_libaccefp"
    skills: ["PyTorch", "TensorFlow", "JAX", "TensorFlow Probability", "scikit-learn", "Neural Networks", "Method Acceleration"]
    
  general:
    name: "General Software"
    description: "Developer tools, utilities, and general-purpose software projects"
    icon: "package"
    url: "/topics/general/"
    projects: []
    skills: ["Git", "GitHub Actions", "Docker", "CI/CD", "Bash", "Python", "DevOps", "Conda/Mamba", "Spack"]

