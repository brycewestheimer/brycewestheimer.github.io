<div class="topic-card topic-card--{{ topic[0] }}">
  <div class="topic-card__icon">
    {% octicon {{ topic[1].icon }} height:32 %}
  </div>
  <h3 class="topic-card__title">{{ topic[1].name }}</h3>
  <p class="topic-card__description">{{ topic[1].description }}</p>
  <div class="topic-card__stats">
    <span class="topic-card__count">{{ topic[1].projects.size }} Projects</span>
  </div>
  <a href="{{ topic[1].url }}" class="topic-card__link">Explore →</a>
</div>
